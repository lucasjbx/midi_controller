<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#1a1a2e" stroke="#4a90d9" stroke-width="2"/>
  <!-- Three vertical faders representing the 3 pots -->
  <!-- Fader 1 (left) -->
  <rect x="14" y="16" width="6" height="32" rx="3" fill="#2d2d44"/>
  <rect x="14" y="28" width="6" height="20" rx="3" fill="#4a90d9"/>
  <rect x="13" y="26" width="8" height="5" rx="2" fill="#e0e0e0"/>
  <!-- Fader 2 (center) -->
  <rect x="29" y="16" width="6" height="32" rx="3" fill="#2d2d44"/>
  <rect x="29" y="22" width="6" height="26" rx="3" fill="#4a90d9"/>
  <rect x="28" y="20" width="8" height="5" rx="2" fill="#e0e0e0"/>
  <!-- Fader 3 (right) -->
  <rect x="44" y="16" width="6" height="32" rx="3" fill="#2d2d44"/>
  <rect x="44" y="34" width="6" height="14" rx="3" fill="#4a90d9"/>
  <rect x="43" y="32" width="8" height="5" rx="2" fill="#e0e0e0"/>
  <!-- MIDI symbol (small circle dots at bottom) -->
  <circle cx="17" cy="54" r="2" fill="#4a90d9"/>
  <circle cx="32" cy="54" r="2" fill="#4a90d9"/>
  <circle cx="47" cy="54" r="2" fill="#4a90d9"/>
</svg>
